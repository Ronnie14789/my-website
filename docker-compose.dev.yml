version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: mywebsite-mongo-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_dev_data:/data/db
    networks:
      - dev-network

  redis:
    image: redis:7.2-alpine
    container_name: mywebsite-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - dev-network

volumes:
  mongo_dev_data:

networks:
  dev-network:
    driver: bridge
